<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hotel Booking</title>

<!-- Materialize CSS -->
 <link rel="stylesheet" href="materialize/css/materialize.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="test.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="transparent z-depth-0 nav-wrapper-custom">
  <div class="nav-wrapper container">
    
    <a href="#" class="brand-logo">Easy Lodge</a>

    <ul class="center hide-on-med-and-down">
      <li class="active"><a href="#">Home</a></li>
      <li><a style="color: black;" href="#">Rooms</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Contacts</a></li>
    </ul>

    <ul class="right hide-on-med-and-down">
      <li><a href="#">Sign In</a></li>
      <li><a class="btn blue">Register</a></li>
    </ul>

  </div>
</nav>


<!-- HERO SECTION -->
<section class="hero">

  <div class="hero-overlay"></div>

  <div class="container hero-content">

    <h2>FIND AND BOOK HOTELS ANYWHERE<br>IN THE WORLD</h2>

    <p>
      Seamless room discovery and booking, no front-desk waiting,
      no hassle. Your perfect stay starts with a tap.
    </p>

    <div class="hero-buttons">
      <a class="btn-large blue">Book Now</a>
      <a class="btn-large grey darken-3">Learn More</a>
    </div>

  </div>


  <!-- BOOKING BOX -->
  <div class="booking-box z-depth-3">

    <div class="row">

      <div class="input-field col s12 m3">
        <input type="text" placeholder="Where are you headed?">
      </div>

      <div class="input-field col s12 m2">
        <input type="text" placeholder="Check In">
      </div>

      <div class="input-field col s12 m2">
        <input type="text" placeholder="Check Out">
      </div>

      <div class="input-field col s12 m3">
        <input type="text" placeholder="Guests & Rooms">
      </div>

      <div class="col s12 m2">
        <a class="btn blue booking-btn">Book Now</a>
      </div>

    </div>

  </div>

</section>


<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

</body>
</html>
