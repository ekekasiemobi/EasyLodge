<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Lodge Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- LEFT SIDE FORM -->

<div class="left">

<h1>Get Started</h1>
<p>Sign in for more easy access</p>

<form>

<label>Name</label>
<input type="text" placeholder="First Name   Last Name">

<label>Email</label>
<input type="email" placeholder="Example@email.com">

<label>Password</label>
<input type="password" placeholder="At least 8 characters">

<div class="terms">
<input type="checkbox">
<span>I agree to the <a href="#">terms & policy</a></span>
</div>

<button class="register">Register</button>

</form>

<div class="divider">Or</div>

<button class="google">Sign in with Google</button>
<button class="facebook">Sign in with Facebook</button>

<p class="signin">Have an account? <a href="#">Sign In</a></p>

<p class="copyright">© 2026 ALL RIGHTS RESERVED</p>

</div>


<!-- RIGHT SIDE IMAGE -->

<div class="right">

<!-- LOGO PLACEHOLDER -->
<div class="logo">
<h3>Easy Lodge</h3>
<p>Open Door Concept</p>
</div>

</div>

</div>

</body>
</html>
