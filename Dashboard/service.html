<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Lodge Services</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f5f5;
}

/* NAVBAR */

.navbar{
background:#23457a;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
position:relative;
}

.logo{
display:flex;
align-items:center;
gap:12px;
color:white;
font-size:22px;
font-weight:600;
}

.logo img{
width:42px;
}

/* NAV LINKS */

.nav-links{
display:flex;
gap:35px;
list-style:none;
}

.nav-links a{
color:white;
text-decoration:none;
opacity:0.9;
font-size:16px;
}

.nav-links a.active{
font-weight:bold;
}

/* HAMBURGER */

.hamburger{
display:none;
font-size:26px;
cursor:pointer;
color:white;
}

/* PAGE CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:80px 20px;
}

/* SERVICES GRID */

.services{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:25px;
margin-bottom:70px;
}

.service-card{
background:#e9e9e9;
border-radius:14px;
padding:45px 20px;
text-align:center;
transition:0.3s;
cursor:pointer;
}

.service-card:hover{
transform:translateY(-6px);
}

.icon{
font-size:30px;
margin-bottom:14px;
}

.service-card h3{
font-weight:500;
font-size:18px;
}

/* REQUEST BOX */

.request{
background:#e9e9e9;
border-radius:14px;
padding:30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.request h3{
font-size:22px;
margin-bottom:4px;
}

.request p{
color:#666;
}

.status{
background:white;
padding:8px 16px;
border-radius:20px;
font-size:13px;
}

/* RESPONSIVE */

/* large tablet */

@media(max-width:1100px){

.services{
grid-template-columns:repeat(3,1fr);
}

}

/* tablet */

@media(max-width:768px){

.services{
grid-template-columns:repeat(2,1fr);
}

.hamburger{
display:block;
}

.nav-links{
position:absolute;
top:70px;
right:0;
background:#23457a;
width:100%;
flex-direction:column;
align-items:center;
display:none;
padding:25px 0;
}

.nav-links.show{
display:flex;
}

.nav-links li{
margin:12px 0;
}

}

/* mobile */

@media(max-width:480px){

.services{
grid-template-columns:1fr;
}

.request{
flex-direction:column;
align-items:flex-start;
gap:15px;
}

.logo span{
font-size:18px;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
<img src="logo.png" alt="Easy Lodge Logo">
<span>Easy Lodge</span>
</div>

<div class="hamburger" id="hamburger">☰</div>

<ul class="nav-links" id="nav-links">
<li><a href="home.html">Home</a></li>
<li><a href="hotels.html">Hotels</a></li>
<li><a href="dashboard.html" class="active">Dashboard</a></li>
<li><a href="rewards.html">Rewards</a></li>
</ul>

</nav>


<!-- CONTENT -->

<div class="container">

<div class="services">

<div class="service-card">
<div class="icon">🍽</div>
<h3>Room services</h3>
</div>

<div class="service-card">
<div class="icon">🛏</div>
<h3>Housekeeping</h3>
</div>

<div class="service-card">
<div class="icon">🧺</div>
<h3>Laundry</h3>
</div>

<div class="service-card">
<div class="icon">🔧</div>
<h3>Maintenance</h3>
</div>

<div class="service-card">
<div class="icon">❓</div>
<h3>Other request</h3>
</div>

</div>


<div class="request">

<div>
<h3>Food</h3>
<p>Room service breakfast for 2</p>
</div>

<div class="status">In progress</div>

</div>

</div>


<script>

/* MOBILE MENU */

const hamburger = document.getElementById("hamburger");
const navLinks = document.getElementById("nav-links");

hamburger.addEventListener("click", () => {
navLinks.classList.toggle("show");
});

</script>

</body>
</html>
