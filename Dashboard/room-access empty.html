<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Access</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f5f5;
}

/* NAVBAR */

.navbar{
background:#23457a;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
position:relative;
}

.logo{
display:flex;
align-items:center;
gap:12px;
color:white;
font-size:22px;
font-weight:600;
}

.logo img{
width:40px;
}

.nav-links{
display:flex;
gap:35px;
list-style:none;
}

.nav-links a{
color:white;
text-decoration:none;
opacity:0.9;
}

.nav-links a.active{
font-weight:bold;
}

.hamburger{
display:none;
font-size:26px;
color:white;
cursor:pointer;
}

/* MOBILE NAV */

@media(max-width:768px){

.hamburger{
display:block;
}

.nav-links{
position:absolute;
top:70px;
right:0;
background:#23457a;
width:100%;
flex-direction:column;
align-items:center;
display:none;
padding:20px 0;
}

.nav-links.show{
display:flex;
}

.nav-links li{
margin:10px 0;
}

}

/* PAGE */

.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

/* BREADCRUMB */

.breadcrumb{
margin-bottom:40px;
color:#666;
font-size:16px;
}

.back-btn{
cursor:pointer;
}

.back-btn:hover{
text-decoration:underline;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:20px;
margin-bottom:40px;
}

.icon{
background:#e6e6e6;
padding:20px;
border-radius:10px;
font-size:24px;
}

.header small{
color:#caa25d;
font-weight:600;
}

.header h1{
font-size:38px;
}

/* EMPTY STATE CARD */

.empty-card{
background:#e9e9e9;
border-radius:20px;
padding:70px 40px;
text-align:center;
max-width:800px;
margin:auto;
}

.empty-card .icon{
margin:auto;
margin-bottom:20px;
}

.empty-card p{
font-size:22px;
margin-bottom:10px;
color:#444;
}

.empty-card span{
color:#666;
display:block;
margin-bottom:25px;
}

.checkin-btn{
background:#23457a;
color:white;
border:none;
padding:14px 28px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

/* FOOTER */

footer{
margin-top:80px;
background:#23457a;
color:white;
padding:30px 40px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.footer-logo{
display:flex;
align-items:center;
gap:10px;
}

.footer-logo img{
width:35px;
}

/* MOBILE */

@media(max-width:600px){

.header{
flex-direction:column;
align-items:flex-start;
}

.header h1{
font-size:30px;
}

.empty-card{
padding:50px 25px;
}

.empty-card p{
font-size:18px;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
<img src="logo.png">
<span>Easy Lodge</span>
</div>

<div class="hamburger" id="hamburger">☰</div>

<ul class="nav-links" id="nav-links">
<li><a href="home.html">Home</a></li>
<li><a href="hotels.html">Hotels</a></li>
<li><a href="dashboard.html" class="active">Dashboard</a></li>
<li><a href="loyalty.html">Rewards</a></li>
</ul>

</nav>


<div class="container">

<!-- BREADCRUMB -->

<div class="breadcrumb">
<span class="back-btn" onclick="goBack()">← Dashboard</span> ; Room access
</div>


<!-- HEADER -->

<div class="header">

<div class="icon">🔑</div>

<div>
<small>Secure Access</small>
<h1>Room Access</h1>
</div>

</div>


<!-- EMPTY STATE -->

<div class="empty-card">

<div class="icon">🔑</div>

<p>No active check-ins.</p>

<span>Check in first to access your room.</span>

<button class="checkin-btn">Start Check-In</button>

</div>

</div>


<!-- FOOTER -->

<footer>

<div class="footer-logo">
<img src="logo.png">
<h3>EASY LODGE</h3>
</div>

<div>
© 2026 EasyLodge, All Right Reserved
</div>

<div>
Terms & Conditions &nbsp;&nbsp; Privacy Policy
</div>

</footer>


<script>

/* HAMBURGER MENU */

const hamburger = document.getElementById("hamburger");
const navLinks = document.getElementById("nav-links");

hamburger.addEventListener("click", ()=>{
navLinks.classList.toggle("show");
});

/* BACK BUTTON */

function goBack(){
history.back();
}

</script>

</body>
</html>
